<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — HubConnect</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .auth-wrapper { width: 100%; max-width: 420px; }

    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo img { height: 48px; width: auto; }

    .auth-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 32px 28px;
    }
    .auth-card h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .auth-card p.subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #aaa; margin-bottom: 7px; }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: #c8f000; }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 48px; }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 18px; color: #666; padding: 4px;
    }

    .forgot-link {
      display: block; text-align: right; font-size: 13px;
      color: #c8f000; text-decoration: none; margin-top: -10px; margin-bottom: 20px;
    }

    .btn-login {
      width: 100%; background: #c8f000; color: #000; border: none;
      border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; padding: 13px 22px; border-radius: 12px; font-size: 14px;
      font-weight: 500; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.4); transition: opacity .4s;
    }
    .toast.success { background: #dcfce7; color: #15803d; }
    .toast.error   { background: #fee2e2; color: #dc2626; }

    .auth-footer { text-align: center; margin-top: 22px; font-size: 14px; color: #666; }
    .auth-footer a { color: #c8f000; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div class="auth-wrapper">

  <div class="auth-logo">
    <img src="HC-Logo.png" alt="HubConnect">
  </div>

  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your account and pools.</p>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="toggle-pw">👁️</button>
        </div>
      </div>

      <a href="reset-password.html" class="forgot-link">Forgot password?</a>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>

    </form>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create account</a>
  </div>

</div>

<script>
const API_BASE = 'https://hubconnect-backend.onrender.com/api';

function showToast(msg, type = 'success') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 4000);
}

// Redirect if already logged in
if (localStorage.getItem('hc_token')) {
  const user = JSON.parse(localStorage.getItem('hc_user') || '{}');
  window.location.href = (user.user_type === 'partner' || user.user_type === 'admin')
    ? 'partner-dashboard.html' : 'dashboard.html';
}

// Show/hide password
const pwInput  = document.getElementById('password');
const toggleBtn = document.getElementById('toggle-pw');
let visible = false;
toggleBtn.addEventListener('click', () => {
  visible = !visible;
  pwInput.type = visible ? 'text' : 'password';
  toggleBtn.textContent = visible ? '🙈' : '👁️';
});

// Login form
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showToast('Please fill in all fields.', 'error'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    const res  = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('hc_token', data.data.token);
      localStorage.setItem('hc_user',  JSON.stringify(data.data.user));
      showToast('Welcome back! 👋');
      const type = data.data.user.user_type;
      setTimeout(() => {
        window.location.href = (type === 'partner' || type === 'admin')
          ? 'partner-dashboard.html' : 'dashboard.html';
      }, 800);
    } else {
      showToast(data.message || 'Invalid email or password.', 'error');
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch {
    showToast('Network error. Please check your connection.', 'error');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>

</body>
</html>

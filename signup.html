<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — HubConnect</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* LOGO */
    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo img {
      height: 48px;
      width: auto;
    }

    /* CARD */
    .auth-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 32px 28px;
    }

    .auth-card h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .auth-card p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 7px;
    }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #c8f000;
    }
    .form-group input.error {
      border-color: #ef4444;
    }
    .form-group input.valid {
      border-color: #22c55e;
    }
    .form-hint {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    /* PASSWORD WRAPPER */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 48px;
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #666;
      padding: 4px;
    }

    /* PASSWORD STRENGTH */
    .pw-rules {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 10px;
      display: none;
    }
    .pw-rules.show { display: block; }
    .pw-rules p {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .pw-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
      transition: color .2s;
    }
    .pw-rule .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      transition: background .2s;
    }
    .pw-rule.pass { color: #22c55e; }
    .pw-rule.pass .dot { background: #22c55e; }
    .pw-rule.pass .dot::after { content: '✓'; color: #000; font-weight: 700; }

    /* SUBMIT BUTTON */
    .btn-signup {
      width: 100%;
      background: #c8f000;
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn-signup:hover { opacity: .9; }
    .btn-signup:active { transform: scale(.98); }
    .btn-signup:disabled { opacity: .6; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      padding: 13px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      transition: opacity .4s;
    }
    .toast.success { background: #dcfce7; color: #15803d; }
    .toast.error   { background: #fee2e2; color: #dc2626; }

    /* FOOTER LINK */
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #666;
    }
    .auth-footer a { color: #c8f000; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div class="auth-wrapper">

  <!-- LOGO close to form -->
  <div class="auth-logo">
    <img src="HC-Logo.png" alt="HubConnect">
  </div>

  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Join 50,000+ Africans saving up to 70% together.</p>

    <form id="signup-form" novalidate>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full-name" placeholder="e.g. Martins Ogundare" required autocomplete="name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 08012345678" required autocomplete="tel">
        <p class="form-hint">Nigerian number — 08012345678 or 07012345678</p>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">👁️</button>
        </div>
        <!-- Live password rules -->
        <div class="pw-rules" id="pw-rules">
          <p>Password must have:</p>
          <div class="pw-rule" id="rule-length"><span class="dot"></span> At least 8 characters</div>
          <div class="pw-rule" id="rule-upper"><span class="dot"></span> One uppercase letter (A–Z)</div>
          <div class="pw-rule" id="rule-lower"><span class="dot"></span> One lowercase letter (a–z)</div>
          <div class="pw-rule" id="rule-number"><span class="dot"></span> One number (0–9)</div>
        </div>
      </div>

      <div class="form-group">
        <label>Referral Code <span style="color:#666;font-weight:400">(Optional)</span></label>
        <input type="text" id="referral-code" placeholder="Enter code if you have one" autocomplete="off">
      </div>

      <button type="submit" class="btn-signup" id="signup-btn">Create Account</button>

    </form>
  </div>

  <div class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API_BASE = 'https://hubconnect-backend.onrender.com/api';

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 4000);
}

// ── REDIRECT IF ALREADY LOGGED IN ────────────────────────────
if (localStorage.getItem('hc_token')) {
  window.location.href = 'dashboard.html';
}

// ── INJECT REFERRAL CODE FROM URL ────────────────────────────
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) document.getElementById('referral-code').value = urlRef;

// ── SHOW/HIDE PASSWORD ────────────────────────────────────────
const pwInput = document.getElementById('password');
const toggleBtn = document.getElementById('toggle-pw');
let pwVisible = false;
toggleBtn.addEventListener('click', () => {
  pwVisible = !pwVisible;
  pwInput.type = pwVisible ? 'text' : 'password';
  toggleBtn.textContent = pwVisible ? '🙈' : '👁️';
});

// ── LIVE PASSWORD RULES ───────────────────────────────────────
pwInput.addEventListener('focus', () => document.getElementById('pw-rules').classList.add('show'));
pwInput.addEventListener('input', () => {
  const val = pwInput.value;
  const check = (id, test) => document.getElementById(id).classList.toggle('pass', test);
  check('rule-length', val.length >= 8);
  check('rule-upper',  /[A-Z]/.test(val));
  check('rule-lower',  /[a-z]/.test(val));
  check('rule-number', /\d/.test(val));
});

// ── NORMALIZE PHONE ───────────────────────────────────────────
function normalizePhone(phone) {
  // Strip spaces, dashes, brackets
  let p = phone.replace(/[\s\-()]/g, '');
  // Convert +234XXXXXXXXXX → 0XXXXXXXXXX
  if (p.startsWith('+234')) p = '0' + p.slice(4);
  // Convert 234XXXXXXXXXX → 0XXXXXXXXXX
  if (p.startsWith('234') && p.length === 13) p = '0' + p.slice(3);
  return p;
}

// ── SIGNUP FORM ───────────────────────────────────────────────
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('signup-btn');
  const fullName  = document.getElementById('full-name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const rawPhone  = document.getElementById('phone').value.trim();
  const password  = document.getElementById('password').value;
  const refCode   = document.getElementById('referral-code').value.trim();

  // Client-side validation
  if (!fullName) { showToast('Please enter your full name.', 'error'); return; }
  if (!email)    { showToast('Please enter your email address.', 'error'); return; }
  if (!rawPhone) { showToast('Please enter your phone number.', 'error'); return; }
  if (password.length < 8 || !/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
    showToast('Password must have 8+ characters, uppercase, lowercase and a number.', 'error');
    return;
  }

  // Split full name
  const parts = fullName.split(' ');
  const first_name = parts[0];
  const last_name  = parts.slice(1).join(' ') || parts[0];
  const phone      = normalizePhone(rawPhone);

  btn.textContent = 'Creating account…';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        first_name,
        last_name,
        email,
        phone,
        password,
        referral_code: refCode || undefined,
      }),
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('hc_token', data.data.token);
      localStorage.setItem('hc_user',  JSON.stringify(data.data.user));
      showToast('Account created! Welcome to HubConnect 🎉');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } else {
      showToast(data.message || 'Signup failed. Please try again.', 'error');
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  } catch (err) {
    showToast('Network error. Please check your connection.', 'error');
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
